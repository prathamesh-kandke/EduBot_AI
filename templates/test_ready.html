<!DOCTYPE html>
<html lang="{{ current_lang }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ lang_strings.test_ready_title }} — EduBotAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ══════════════════════════════════
           DARK TOKENS
        ══════════════════════════════════ */
        :root {
            --bg:           #020d18;
            --orb-1:        rgba(0, 190, 210, 0.30);
            --orb-2:        rgba(0, 80,  210, 0.26);
            --orb-3:        rgba(0, 230, 165, 0.16);
            --glass:        rgba(255,255,255,0.055);
            --glass-md:     rgba(255,255,255,0.09);
            --glass-hi:     rgba(255,255,255,0.13);
            --gb:           rgba(255,255,255,0.10);
            --gb-hover:     rgba(0,212,232,0.35);
            --text:         #e8f5ff;
            --text-2:       rgba(232,245,255,0.55);
            --text-3:       rgba(232,245,255,0.28);
            --cyan:         #00d4e8;
            --cyan-soft:    rgba(0,212,232,0.12);
            --cyan-glow:    rgba(0,212,232,0.22);
            --green:        #00e8a0;
            --nav-bg:       rgba(2,13,24,0.72);
            --input-bg:     rgba(0,0,0,0.22);
            --noise-op:     0.038;
        }

        /* ══════════════════════════════════
           LIGHT TOKENS
        ══════════════════════════════════ */
        [data-theme="light"] {
            --bg:           #dff2fc;
            --orb-1:        rgba(0, 150, 185, 0.22);
            --orb-2:        rgba(0,  70, 190, 0.14);
            --orb-3:        rgba(0, 190, 140, 0.16);
            --glass:        rgba(255,255,255,0.52);
            --glass-md:     rgba(255,255,255,0.66);
            --glass-hi:     rgba(255,255,255,0.82);
            --gb:           rgba(0,140,175,0.16);
            --gb-hover:     rgba(0,122,155,0.40);
            --text:         #021824;
            --text-2:       rgba(2,24,36,0.56);
            --text-3:       rgba(2,24,36,0.36);
            --cyan:         #006e8a;
            --cyan-soft:    rgba(0,110,138,0.10);
            --cyan-glow:    rgba(0,110,138,0.14);
            --green:        #008060;
            --nav-bg:       rgba(215,240,252,0.78);
            --input-bg:     rgba(255,255,255,0.55);
            --noise-op:     0.018;
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Instrument Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
            display: flex; flex-direction: column;
            transition: background 0.45s, color 0.45s;
        }

        /* ── Orb background ── */
        .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(95px);
            animation: floatOrb 16s ease-in-out infinite alternate;
            transition: background 0.45s;
        }
        .orb-1 { width: 680px; height: 680px; background: var(--orb-1); top: -220px; left: -160px; }
        .orb-2 { width: 560px; height: 560px; background: var(--orb-2); bottom: -120px; right: -100px; animation-delay: -6s; }
        .orb-3 { width: 400px; height: 400px; background: var(--orb-3); top: 45%; left: 38%; animation-delay: -10s; }
        @keyframes floatOrb {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(32px,40px) scale(1.09); }
        }

        .bg-noise {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            opacity: var(--noise-op);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px; transition: opacity 0.45s;
        }

        /* ══════════════════════════════════
           NAVBAR
        ══════════════════════════════════ */
        nav {
            position: sticky; top: 0; z-index: 999;
            height: 64px;
            background: var(--nav-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-bottom: 1px solid var(--gb);
            padding: 0 clamp(1rem,5vw,4rem);
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.45s;
        }

        .logo {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.32rem; font-weight: 800; letter-spacing: -0.035em;
            text-decoration: none; color: var(--text);
            display: flex; align-items: center; gap: 9px;
        }
        .logo-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow);
            animation: pulseDot 2.6s ease-in-out infinite;
        }
        @keyframes pulseDot {
            0%,100%{ transform:scale(1);   box-shadow:0 0 10px var(--cyan-glow); }
            50%    { transform:scale(1.35); box-shadow:0 0 20px var(--cyan-glow); }
        }
        .logo em { color: var(--cyan); font-style: normal; }

        .nav-right { display: flex; align-items: center; gap: 8px; }

        .theme-btn {
            width: 38px; height: 38px; border-radius: 10px;
            background: var(--glass); border: 1px solid var(--gb);
            backdrop-filter: blur(10px); cursor: pointer;
            display: grid; place-items: center; font-size: 0.95rem;
            transition: all 0.2s;
        }
        .theme-btn:hover { background: var(--glass-md); border-color: var(--gb-hover); }
        .icon-moon { display: block; } .icon-sun { display: none; }
        [data-theme="light"] .icon-moon { display: none; }
        [data-theme="light"] .icon-sun  { display: block; }

        /* ══════════════════════════════════
           MAIN LAYOUT
        ══════════════════════════════════ */
        main {
            position: relative; z-index: 1;
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 48px 20px;
        }

        /* ── Glass Card ── */
        .card {
            width: 100%; max-width: 520px;
            background: var(--glass); border: 1px solid var(--gb);
            backdrop-filter: blur(34px) saturate(180%); -webkit-backdrop-filter: blur(34px) saturate(180%);
            border-radius: 28px; padding: 48px 40px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.3);
            animation: floatIn 0.6s ease both;
        }
        .card::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
            background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, transparent 60%);
        }
        /* Top cyan-green line */
        .card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--green), transparent);
        }

        /* ── Success Icon ── */
        .success-ring {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0,232,160,0.12); border: 1.5px solid rgba(0,232,160,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; position: relative; z-index: 1;
            animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        .success-ring svg { width: 40px; height: 40px; color: var(--green); }
        [data-theme="light"] .success-ring svg { color: #059669; }

        .success-ring::before {
            content: ''; position: absolute; width: 80px; height: 80px; border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(0,212,232,0.4), transparent 40%, rgba(0,232,160,0.4), transparent 80%);
            animation: spin 4s linear infinite; filter: blur(6px); z-index: -1;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Typography ── */
        .card-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
            margin-bottom: 8px; position: relative; z-index: 1;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .card-sub { font-size: 0.95rem; color: var(--text-2); line-height: 1.6; font-weight: 400; margin-bottom: 36px; position: relative; z-index: 1; }

        /* ── Test ID Box ── */
        .test-id-box {
            background: var(--input-bg); border: 1px solid var(--gb);
            border-radius: 16px; padding: 20px 24px; margin-bottom: 36px;
            position: relative; z-index: 1; backdrop-filter: blur(8px);
        }
        .test-id-label {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--text-3);
            margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .test-id-value {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem; font-weight: 800; color: var(--text); letter-spacing: 0.05em;
            word-break: break-all; user-select: all; display: block; margin-bottom: 14px;
        }

        /* ── Copy Button ── */
        .copy-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--cyan-soft); border: 1px solid rgba(0,212,232,0.25);
            color: var(--cyan); border-radius: 10px; padding: 8px 18px;
            font-family: 'Instrument Sans', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        [data-theme="light"] .copy-btn { color: #006e8a; }
        .copy-btn:hover { background: rgba(0,212,232,0.2); transform: scale(1.04); }
        .copy-btn.copied { background: var(--green-soft); color: var(--green); border-color: rgba(0,232,160,0.3); }
        [data-theme="light"] .copy-btn.copied { color: #059669; }

        /* ── Actions ── */
        .actions { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 1; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 20px; border-radius: 14px; width: 100%;
            font-family: 'Bricolage Grotesque', sans-serif; font-size: 0.95rem; font-weight: 700;
            text-decoration: none; border: none; cursor: pointer; letter-spacing: -0.01em;
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s, background 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }

        .btn-print {
            background: rgba(0,212,232,0.12); border: 1px solid rgba(0,212,232,0.25); color: var(--cyan);
        }
        .btn-print:hover { background: rgba(0,212,232,0.2); }
        [data-theme="light"] .btn-print { color: #006e8a; }

        .btn-primary {
            background: linear-gradient(135deg, #00d4e8, #00e8a0); color: #021824;
            box-shadow: 0 4px 16px rgba(0,212,232,0.25); font-weight: 800;
        }
        .btn-primary:hover { box-shadow: 0 8px 24px rgba(0,212,232,0.4); filter: brightness(1.07); }

        .btn-secondary {
            background: var(--glass); border: 1px solid var(--gb); color: var(--text);
        }
        .btn-secondary:hover { background: var(--glass-md); border-color: var(--gb-hover); }

        @keyframes floatIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            nav { padding: 14px 18px; }
            .card { padding: 40px 24px; border-radius: 22px; }
            .test-id-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="bg-noise"></div>

    <nav>
        <a href="/" class="logo">
            <div class="logo-dot"></div>
            EduBot<em>AI</em>
        </a>
        <div class="nav-right">
            <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </button>
        </div>
    </nav>

    <main>
        <div class="card">

            <div class="success-ring">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <div class="card-title">{{ lang_strings.test_ready_title }}</div>
            <p class="card-sub">{{ lang_strings.share_test_id_msg }}</p>

            <div class="test-id-box">
                <span class="test-id-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    Test ID — Share with students
                </span>
                <code class="test-id-value" id="testId">{{ test_id }}</code>
                <button class="copy-btn" id="copyBtn" onclick="copyId()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Copy ID
                </button>
            </div>

            <div class="actions">
                <a href="{{ url_for('print_test', test_id=test_id) }}" target="_blank" class="btn btn-print">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
                    Print / Download Question Paper
                </a>
                <a href="{{ url_for('teacher_page') }}" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                    {{ lang_strings.create_another_test_btn }}
                </a>
                <a href="{{ url_for('dashboard_page') }}" class="btn btn-secondary">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                    Back to Dashboard
                </a>
            </div>

        </div>
    </main>

    <script>
        // ── Theme Toggle ──
        const html = document.documentElement;
        const themeBtn = document.getElementById('themeBtn');
        if (localStorage.getItem('edubot-theme') === 'light') html.setAttribute('data-theme', 'light');
        themeBtn.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('edubot-theme', next);
        });

        // ── Copy Test ID ──
        function copyId() {
            const id = document.getElementById('testId').textContent.trim();
            navigator.clipboard.writeText(id).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.classList.add('copied');
                btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Copied!`;
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy ID`;
                }, 2500);
            });
        }
    </script>

</body>
</html>
